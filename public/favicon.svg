<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="line" x1="10" y1="50" x2="54" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Mini candlesticks -->
  <rect x="13" y="28" width="5" height="14" rx="1" fill="#dc2626" opacity="0.8"/>
  <rect x="23" y="24" width="5" height="12" rx="1" fill="url(#g)" opacity="0.85"/>
  <rect x="33" y="18" width="5" height="16" rx="1" fill="url(#g)" opacity="0.9"/>
  <rect x="43" y="12" width="5" height="14" rx="1" fill="url(#g)"/>
  <!-- Trend line -->
  <polyline points="15,34 25,30 35,24 45,16" fill="none" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="45" cy="16" r="3" fill="#22d3ee"/>
  <!-- 갤 text -->
  <text x="32" y="56" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="13" fill="white" opacity="0.95">주식갤</text>
</svg>
