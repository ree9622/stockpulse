name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/ec2-user/stockpulse

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile || pnpm install

            echo "🔄 Refreshing secrets..."
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id stockpulse/config \
              --region ap-northeast-2 \
              --query SecretString \
              --output text)

            cat > .env.local << 'ENVEOF'
            # Auto-generated from AWS Secrets Manager
            ENVEOF

            echo "$SECRET_JSON" | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for k, v in data.items():
                print(f'{k}={v}')
            " >> .env.local

            cat >> .env.local << ENVEOF
            NEXTAUTH_URL=https://stockgall.click/stockpulse
            NODE_ENV=production
            ENVEOF

            echo "🔨 Building..."
            pnpm build

            echo "♻️  Restarting pm2..."
            pm2 restart stockpulse || pm2 start "pnpm start" --name stockpulse

            echo "✅ Deploy complete!"
